<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PM Backend Hello</title>
    <style>
      :root {
        --accent-yellow: #ecad0a;
        --primary-blue: #209dd7;
        --secondary-purple: #753991;
        --navy-dark: #032147;
        --gray-text: #888888;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #f7f8fb;
        color: var(--navy-dark);
      }
      main {
        max-width: 800px;
        margin: 60px auto;
        padding: 24px;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 16px 40px rgba(3, 33, 71, 0.12);
        border: 1px solid rgba(3, 33, 71, 0.08);
      }
      h1 {
        margin-top: 0;
      }
      .status {
        margin-top: 12px;
        color: var(--gray-text);
      }
      code {
        color: var(--secondary-purple);
      }
      .ok {
        color: var(--primary-blue);
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Project Management MVP: Hello World</h1>
      <p>This page is served by FastAPI from inside Docker.</p>
      <p>API check: calling <code>/api/hello</code>...</p>
      <p id="api-status" class="status">Waiting for API response</p>
    </main>

    <script>
      async function runCheck() {
        const statusEl = document.getElementById("api-status");
        try {
          const response = await fetch("/api/hello");
          if (!response.ok) {
            statusEl.textContent = `API request failed (${response.status})`;
            return;
          }
          const data = await response.json();
          statusEl.innerHTML = `<span class="ok">Success:</span> ${data.message}`;
        } catch (error) {
          statusEl.textContent = `API request error: ${error}`;
        }
      }

      runCheck();
    </script>
  </body>
</html>
